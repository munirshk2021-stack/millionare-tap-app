<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>CoinTap – Earn Coins</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold:    #FFD700;
    --gold2:   #FFA500;
    --gold3:   #FF8C00;
    --dark:    #0a0a1a;
    --dark2:   #0f0f2e;
    --dark3:   #141432;
    --surface: #1a1a3e;
    --border:  #2a2a5e;
    --text:    #e8e8ff;
    --muted:   #8888bb;
    --green:   #00ff88;
    --blue:    #4488ff;
    --purple:  #aa44ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }

  body {
    background: var(--dark);
    font-family: 'Exo 2', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── ANIMATED BG ── */
  .bg-stars {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(100,50,255,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,150,0,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(0,200,255,0.06) 0%, transparent 50%);
    animation: bgPulse 6s ease-in-out infinite alternate;
  }
  @keyframes bgPulse {
    from { opacity: 0.8; }
    to   { opacity: 1.2; }
  }

  /* Floating particles */
  .particle {
    position: fixed;
    width: 2px; height: 2px;
    background: var(--gold);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-20px) scale(1); opacity: 0; }
  }

  /* ── MAIN LAYOUT ── */
  #app {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100vh;
    padding: 0;
  }

  /* ── TOP BAR ── */
  .top-bar {
    width: 100%;
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(10,10,30,0.95) 0%, transparent 100%);
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold3));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--dark);
    border: 2px solid rgba(255,215,0,0.4);
    box-shadow: 0 0 12px rgba(255,215,0,0.3);
  }
  .user-name {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--text);
  }
  .user-level {
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 600;
  }

  .top-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }
  .boost-btn {
    background: linear-gradient(135deg, #ff4444, #ff0088);
    border: none; border-radius: 20px;
    color: #fff; font-size: 0.72rem; font-weight: 700;
    padding: 5px 12px; cursor: pointer;
    font-family: 'Exo 2', sans-serif;
    box-shadow: 0 2px 10px rgba(255,0,100,0.35);
    transition: transform 0.15s;
  }
  .boost-btn:active { transform: scale(0.95); }

  /* ── COIN COUNTER ── */
  .coin-display {
    text-align: center;
    margin: 6px 0 8px;
  }
  .coin-count {
    font-family: 'Orbitron', monospace;
    font-size: 2.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, #FFD700, #FFA500, #FF6B00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1;
    transition: transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .coin-count .coin-icon-sm { font-size: 2rem; -webkit-text-fill-color: initial; }
  .per-tap {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 600;
  }
  .per-tap span { color: var(--gold); }

  /* ── ENERGY BAR ── */
  .energy-wrap {
    width: 90%;
    max-width: 340px;
    margin: 0 auto 10px;
  }
  .energy-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 600;
  }
  .energy-label .en-val { color: var(--green); }
  .energy-bar-track {
    height: 7px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .energy-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #00ff88, #00ccff);
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(0,255,136,0.5);
  }

  /* ── MAIN COIN (CLICKER) ── */
  .clicker-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }

  .coin-btn {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    border: none;
    background: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.08s;
  }
  .coin-btn:active { transform: scale(0.93); }

  .coin-outer {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #FFD700 0deg, #FFA500 60deg,
      #FFD700 120deg, #FF8C00 180deg,
      #FFD700 240deg, #FFA500 300deg,
      #FFD700 360deg
    );
    display: flex; align-items: center; justify-content: center;
    box-shadow:
      0 0 0 4px rgba(255,215,0,0.3),
      0 0 30px rgba(255,165,0,0.5),
      0 0 70px rgba(255,100,0,0.2),
      inset 0 -6px 20px rgba(0,0,0,0.4),
      inset 0 6px 20px rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
    animation: coinRotate 8s linear infinite;
  }
  @keyframes coinRotate {
    from { filter: hue-rotate(0deg); }
    to   { filter: hue-rotate(30deg); }
  }

  .coin-outer::before {
    content: '';
    position: absolute;
    top: 8px; left: 8px; right: 8px; bottom: 8px;
    border-radius: 50%;
    background: linear-gradient(145deg, rgba(255,255,255,0.25) 0%, transparent 60%);
    pointer-events: none;
  }

  .coin-inner {
    width: 82%;
    height: 82%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%,
      #FFE44D 0%, #FFD700 30%, #CC8800 70%, #996600 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5.5rem;
    box-shadow:
      inset 0 4px 16px rgba(255,255,255,0.3),
      inset 0 -4px 16px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
  }

  /* Pulse ring on click */
  .pulse-ring {
    position: absolute;
    width: 220px; height: 220px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    opacity: 0;
    pointer-events: none;
    animation: none;
  }
  .pulse-ring.animate {
    animation: pulseOut 0.5s ease-out forwards;
  }
  @keyframes pulseOut {
    0%   { transform: scale(1);   opacity: 0.8; }
    100% { transform: scale(1.7); opacity: 0; }
  }

  /* ── FLOATING +1 LABELS ── */
  .float-label {
    position: fixed;
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
    pointer-events: none;
    z-index: 999;
    animation: floatLabel 1s ease-out forwards;
  }
  @keyframes floatLabel {
    0%   { transform: translateY(0) scale(1);    opacity: 1; }
    100% { transform: translateY(-90px) scale(0.6); opacity: 0; }
  }

  /* ── BOTTOM STATS STRIP ── */
  .stats-strip {
    width: 100%;
    padding: 10px 16px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    background: linear-gradient(0deg, rgba(10,10,30,0.98) 0%, transparent 100%);
  }

  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .stat-card .s-val {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-card .s-lbl {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  /* ── UPGRADE PANEL ── */
  .upgrade-panel {
    width: 100%;
    padding: 0 16px 6px;
  }
  .up-title {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .upgrades-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .upgrades-row::-webkit-scrollbar { display: none; }

  .upg-card {
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    text-align: center;
    min-width: 90px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .upg-card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,215,0,0.08), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .upg-card:hover::before,
  .upg-card.affordable::before { opacity: 1; }
  .upg-card.affordable {
    border-color: rgba(255,215,0,0.4);
    box-shadow: 0 0 12px rgba(255,215,0,0.15);
  }
  .upg-card.maxed {
    border-color: rgba(0,255,136,0.3);
    opacity: 0.7;
    cursor: default;
  }
  .upg-card:active:not(.maxed) { transform: scale(0.95); }

  .upg-icon { font-size: 1.5rem; margin-bottom: 4px; }
  .upg-name { font-size: 0.65rem; color: var(--text); font-weight: 700; margin-bottom: 3px; }
  .upg-cost {
    font-size: 0.62rem;
    color: var(--gold);
    font-weight: 700;
    font-family: 'Orbitron', monospace;
  }
  .upg-level {
    font-size: 0.58rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .upg-cost.cant { color: var(--muted); }

  /* ── COMBO INDICATOR ── */
  .combo-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -180px);
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 900;
    color: var(--purple);
    text-shadow: 0 0 15px rgba(170,68,255,0.8);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .combo-display.visible { opacity: 1; }

  /* ── BOOST ACTIVE INDICATOR ── */
  .boost-active {
    position: fixed;
    top: 70px; left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(135deg, #ff4444, #ff0088);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 999px;
    box-shadow: 0 4px 16px rgba(255,0,100,0.4);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
    font-family: 'Exo 2', sans-serif;
  }
  .boost-active.show { opacity: 1; }

  /* ── MILESTONE TOAST ── */
  .toast {
    position: fixed;
    bottom: 180px;
    left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--surface), #2a2a5e);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 14px;
    padding: 12px 20px;
    text-align: center;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--gold);
    box-shadow: 0 8px 28px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 500;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="bg-stars"></div>

<div id="app">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="user-info">
      <div class="avatar" id="avatarEl">👤</div>
      <div>
        <div class="user-name" id="userNameEl">Player</div>
        <div class="user-level" id="userLevelEl">⭐ Level 1</div>
      </div>
    </div>
    <div class="top-right">
      <button class="boost-btn" onclick="activateBoost()">⚡ BOOST</button>
    </div>
  </div>

  <!-- COIN COUNT -->
  <div class="coin-display">
    <div class="coin-count">
      <span class="coin-icon-sm">🪙</span>
      <span id="coinCount">0</span>
    </div>
    <div class="per-tap">+<span id="tapVal">1</span> per tap &nbsp;|&nbsp; Total: <span id="totalCoins">0</span></div>
  </div>

  <!-- ENERGY BAR -->
  <div class="energy-wrap">
    <div class="energy-label">
      <span>⚡ Energy</span>
      <span class="en-val"><span id="energyVal">1000</span> / <span id="energyMax">1000</span></span>
    </div>
    <div class="energy-bar-track">
      <div class="energy-bar-fill" id="energyBar" style="width:100%"></div>
    </div>
  </div>

  <!-- CLICKER -->
  <div class="clicker-area">
    <div class="pulse-ring" id="pulseRing"></div>
    <button class="coin-btn" id="coinBtn" onclick="handleTap(event)">
      <div class="coin-outer">
        <div class="coin-inner">🪙</div>
      </div>
    </button>
  </div>

  <!-- UPGRADES -->
  <div class="upgrade-panel">
    <div class="up-title">⬆️ Upgrades</div>
    <div class="upgrades-row" id="upgradesRow"></div>
  </div>

  <!-- STATS STRIP -->
  <div class="stats-strip">
    <div class="stat-card">
      <div class="s-val" id="statTaps">0</div>
      <div class="s-lbl">Total Taps</div>
    </div>
    <div class="stat-card">
      <div class="s-val" id="statCombo">x1</div>
      <div class="s-lbl">Best Combo</div>
    </div>
    <div class="stat-card">
      <div class="s-val" id="statLevel">1</div>
      <div class="s-lbl">Level</div>
    </div>
  </div>

</div>

<!-- COMBO DISPLAY -->
<div class="combo-display" id="comboDisplay">🔥 COMBO x1</div>
<!-- BOOST ACTIVE -->
<div class="boost-active" id="boostActive">⚡ BOOST ACTIVE!</div>
<!-- TOAST -->
<div class="toast" id="toast">🎉 Milestone!</div>

<script>
// ══════════════════════════════════════
// TELEGRAM INIT
// ══════════════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a1a');
  tg.setBackgroundColor('#0a0a1a');
}

// ══════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════
let state = {
  coins:      0,
  totalCoins: 0,
  taps:       0,
  tapPower:   1,
  energy:     1000,
  energyMax:  1000,
  level:      1,
  combo:      0,
  bestCombo:  1,
  boostActive:false,
  boostTimer: null,
  comboTimer: null,
  lastTapTime:0,
};

// Load from localStorage
function loadState() {
  try {
    const saved = localStorage.getItem('gz_coin_state');
    if (saved) Object.assign(state, JSON.parse(saved));
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('gz_coin_state', JSON.stringify(state)); } catch(e) {}
}

// ══════════════════════════════════════
// UPGRADES
// ══════════════════════════════════════
const UPGRADES = [
  { id:'tap2',   icon:'👆', name:'Better Tap',   baseCost:50,   coeff:2.5, maxLvl:10, effect:'tapPower', inc:1,   lvl:0 },
  { id:'energy', icon:'⚡', name:'More Energy',  baseCost:200,  coeff:2,   maxLvl:5,  effect:'energyMax',inc:200, lvl:0 },
  { id:'regen',  icon:'🔋', name:'Fast Regen',   baseCost:500,  coeff:2.2, maxLvl:5,  effect:'regenRate',inc:1,   lvl:0 },
  { id:'multi',  icon:'💥', name:'Multiplier',   baseCost:1000, coeff:3,   maxLvl:5,  effect:'tapPower', inc:3,   lvl:0 },
  { id:'auto',   icon:'🤖', name:'Auto Tap',     baseCost:2000, coeff:2.8, maxLvl:3,  effect:'autoTap',  inc:1,   lvl:0 },
];

function upgCost(upg) {
  return Math.floor(upg.baseCost * Math.pow(upg.coeff, upg.lvl));
}

function buildUpgrades() {
  const row = document.getElementById('upgradesRow');
  row.innerHTML = '';
  UPGRADES.forEach((upg, i) => {
    const cost = upgCost(upg);
    const maxed = upg.lvl >= upg.maxLvl;
    const afford = state.coins >= cost && !maxed;
    const el = document.createElement('div');
    el.className = 'upg-card' + (maxed?' maxed':'') + (afford?' affordable':'');
    el.innerHTML = `
      <div class="upg-icon">${upg.icon}</div>
      <div class="upg-name">${upg.name}</div>
      <div class="upg-cost ${afford||maxed?'':'cant'}">
        ${maxed ? '✅ MAX' : '🪙 ' + formatNum(cost)}
      </div>
      <div class="upg-level">Lv ${upg.lvl}/${upg.maxLvl}</div>
    `;
    if (!maxed) el.onclick = () => buyUpgrade(i);
    row.appendChild(el);
  });
}

function buyUpgrade(i) {
  const upg = UPGRADES[i];
  if (upg.lvl >= upg.maxLvl) return;
  const cost = upgCost(upg);
  if (state.coins < cost) {
    showToast('❌ Not enough coins!');
    return;
  }
  state.coins -= cost;
  upg.lvl++;

  // Apply effect
  if (upg.effect === 'tapPower') {
    state.tapPower += upg.inc;
  } else if (upg.effect === 'energyMax') {
    state.energyMax += upg.inc;
    state.energy = Math.min(state.energy + upg.inc, state.energyMax);
  } else if (upg.effect === 'autoTap') {
    // auto tap handled in interval
  }

  showToast(`✅ ${upg.name} upgraded!`);
  updateUI();
  buildUpgrades();
  saveState();
}

// ══════════════════════════════════════
// TAP HANDLER
// ══════════════════════════════════════
function handleTap(e) {
  if (state.energy <= 0) {
    showToast('⚡ No energy! Wait a moment...');
    return;
  }

  const now = Date.now();
  const timeDiff = now - state.lastTapTime;

  // Combo logic
  if (timeDiff < 600) {
    state.combo = Math.min(state.combo + 1, 50);
  } else {
    state.combo = 1;
  }
  state.lastTapTime = now;
  state.bestCombo = Math.max(state.bestCombo, state.combo);

  // Reset combo timer
  clearTimeout(state.comboTimer);
  state.comboTimer = setTimeout(() => { state.combo = 0; hideCombo(); }, 1500);

  // Calculate coins earned
  let comboMult = state.combo >= 10 ? 3 : state.combo >= 5 ? 2 : 1;
  let earned = state.tapPower * (state.boostActive ? 3 : 1) * comboMult;

  state.coins      += earned;
  state.totalCoins += earned;
  state.taps++;
  state.energy     = Math.max(0, state.energy - 1);

  // Floating label
  spawnFloat(e, '+' + earned);

  // Pulse ring
  triggerPulse();

  // Combo display
  if (state.combo >= 2) showCombo();

  // Level up
  checkLevel();

  // Milestones
  checkMilestone();

  updateUI();
  saveState();
}

function spawnFloat(e, text) {
  const el = document.createElement('div');
  el.className = 'float-label';
  el.textContent = text;
  const x = e?.clientX ?? window.innerWidth/2;
  const y = e?.clientY ?? window.innerHeight/2;
  el.style.left = (x - 20 + (Math.random()*40-20)) + 'px';
  el.style.top  = (y - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function triggerPulse() {
  const ring = document.getElementById('pulseRing');
  ring.classList.remove('animate');
  void ring.offsetWidth;
  ring.classList.add('animate');
}

// ══════════════════════════════════════
// COMBO
// ══════════════════════════════════════
function showCombo() {
  const el = document.getElementById('comboDisplay');
  const emojis = state.combo >= 20 ? '🔥🔥🔥' : state.combo >= 10 ? '🔥🔥' : '🔥';
  el.textContent = emojis + ' COMBO x' + state.combo;
  el.classList.add('visible');
  document.getElementById('statCombo').textContent = 'x' + state.bestCombo;
}
function hideCombo() {
  document.getElementById('comboDisplay').classList.remove('visible');
}

// ══════════════════════════════════════
// BOOST
// ══════════════════════════════════════
let boostCooldown = false;
function activateBoost() {
  if (boostCooldown) { showToast('⏳ Boost cooling down...'); return; }
  state.boostActive = true;
  boostCooldown = true;
  document.getElementById('boostActive').classList.add('show');
  clearTimeout(state.boostTimer);
  state.boostTimer = setTimeout(() => {
    state.boostActive = false;
    document.getElementById('boostActive').classList.remove('show');
    setTimeout(() => { boostCooldown = false; }, 15000); // 15s cooldown
    showToast('⚡ Boost ended. 15s cooldown.');
  }, 8000); // 8s boost
}

// ══════════════════════════════════════
// ENERGY REGEN
// ══════════════════════════════════════
let regenRate = 1; // per second
setInterval(() => {
  const baseRegen = 1 + UPGRADES.find(u=>u.effect==='regenRate')?.lvl || 0;
  if (state.energy < state.energyMax) {
    state.energy = Math.min(state.energyMax, state.energy + baseRegen);
    updateEnergyBar();
  }
}, 1000);

// ══════════════════════════════════════
// AUTO TAP
// ══════════════════════════════════════
setInterval(() => {
  const autoUpg = UPGRADES.find(u => u.effect === 'autoTap');
  if (autoUpg && autoUpg.lvl > 0 && state.energy > 0) {
    const earned = autoUpg.lvl;
    state.coins += earned;
    state.totalCoins += earned;
    state.energy = Math.max(0, state.energy - autoUpg.lvl);
    updateUI();
  }
}, 2000);

// ══════════════════════════════════════
// LEVELS
// ══════════════════════════════════════
const LEVEL_THRESHOLDS = [0,100,500,2000,8000,25000,80000,250000,1000000,5000000];
function checkLevel() {
  for (let i = LEVEL_THRESHOLDS.length-1; i >= 0; i--) {
    if (state.totalCoins >= LEVEL_THRESHOLDS[i]) {
      if (state.level !== i+1) {
        state.level = i+1;
        showToast('🎉 Level Up! Now Level ' + state.level);
        document.getElementById('userLevelEl').textContent = '⭐ Level ' + state.level;
        document.getElementById('statLevel').textContent = state.level;
      }
      break;
    }
  }
}

// ══════════════════════════════════════
// MILESTONES
// ══════════════════════════════════════
const MILESTONES = [100,500,1000,5000,10000,50000,100000,1000000];
let lastMilestone = 0;
function checkMilestone() {
  for (let m of MILESTONES) {
    if (state.totalCoins >= m && lastMilestone < m) {
      lastMilestone = m;
      showToast('🏆 ' + formatNum(m) + ' coins milestone!');
    }
  }
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════
// UI UPDATE
// ══════════════════════════════════════
function formatNum(n) {
  if (n >= 1e9) return (n/1e9).toFixed(1) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.floor(n).toLocaleString();
}

function updateEnergyBar() {
  const pct = (state.energy / state.energyMax) * 100;
  document.getElementById('energyBar').style.width = pct + '%';
  document.getElementById('energyVal').textContent = Math.floor(state.energy);
  document.getElementById('energyMax').textContent = state.energyMax;
}

function updateUI() {
  document.getElementById('coinCount').textContent = formatNum(state.coins);
  document.getElementById('totalCoins').textContent = formatNum(state.totalCoins);
  document.getElementById('tapVal').textContent = state.tapPower * (state.boostActive ? 3 : 1);
  document.getElementById('statTaps').textContent = formatNum(state.taps);
  document.getElementById('statLevel').textContent = state.level;
  document.getElementById('userLevelEl').textContent = '⭐ Level ' + state.level;
  updateEnergyBar();
  buildUpgrades();
}

// ══════════════════════════════════════
// PARTICLES
// ══════════════════════════════════════
function spawnParticles() {
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (4 + Math.random()*6) + 's';
    p.style.animationDelay = (Math.random()*8) + 's';
    p.style.width = p.style.height = (1 + Math.random()*2) + 'px';
    document.body.appendChild(p);
  }
}

// ══════════════════════════════════════
// TELEGRAM USER INFO
// ══════════════════════════════════════
function initUser() {
  const user = tg?.initDataUnsafe?.user;
  if (user) {
    const name = user.first_name || 'Player';
    document.getElementById('userNameEl').textContent = name;
    const initials = name.charAt(0).toUpperCase();
    document.getElementById('avatarEl').textContent = initials;
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
loadState();
initUser();
spawnParticles();
updateUI();
buildUpgrades();

// Autosave
setInterval(saveState, 5000);

// Haptic on tap (Telegram)
document.getElementById('coinBtn').addEventListener('click', () => {
  tg?.HapticFeedback?.impactOccurred('medium');
});
</script>
</body>
</html>
